<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat UI</title>
  </head>
  <body>
    <input type="text" id="token" placeholder="Enter your JWT" />
    <button onclick="connect()">Connect</button>

    <div id="box">
      <!-- chứa messages broadcast từ server -->
    </div>

    <input type="text" id="text" placeholder="Enter your messages..." />
    <button onclick="send()">Send</button>

    <script src="./script.js"></script>
  </body>
</html>
